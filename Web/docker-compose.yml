services:
  backend:
    build: ./backend
    container_name: backend-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: always

  frontend:
    build: ./Front-End
    container_name: frontend-app
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  postgres:
    image: postgres:15
    container_name: eduaircontrol-db
    environment:
      POSTGRES_DB: eduaircontrol
      POSTGRES_USER: eduair_user
      POSTGRES_PASSWORD: eduair_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
  jenkins:
    build:
      context: ../jenkins
    container_name: jenkins
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

volumes:
  postgres_data:
  jenkins_data: